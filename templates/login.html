<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MIS Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.brand{width:60px;height:60px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px;color:white}
h2{color:#f1f5f9;text-align:center;font-size:1.4rem;font-weight:700;margin-bottom:4px}
.sub{color:#94a3b8;text-align:center;font-size:.85rem;margin-bottom:28px}
.form-label{color:#cbd5e1;font-size:.85rem;font-weight:500}
.form-control{background:#0f172a;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:10px 14px}
.form-control:focus{background:#0f172a;border-color:#3b82f6;color:#f1f5f9;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.btn-login{background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;color:white;width:100%;padding:11px;border-radius:8px;font-weight:600;margin-top:8px}
.btn-login:hover{opacity:.9;color:white}
.alert-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:8px;font-size:.85rem}
.creds{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px 16px;margin-top:20px}
.creds p{color:#64748b;font-size:.72rem;margin:0 0 8px;text-transform:uppercase;letter-spacing:.05em}
.cred-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cred-row span{color:#94a3b8;font-size:.76rem}
.register-link{text-align:center;margin-top:16px}
.register-link a{color:#60a5fa;font-size:.83rem;text-decoration:none}
.register-link a:hover{color:#93c5fd}
</style></head>
<body>
<div class="card">
  <div class="brand"><i class="bi bi-shield-lock-fill"></i></div>
  <h2>Cyber Incident MIS</h2>
  <p class="sub">Sign in to access your dashboard</p>
  {% if error %}<div class="alert alert-danger"><i class="bi bi-exclamation-circle me-2"></i>{{error}}</div>{% endif %}
  <form method="POST">
    <div class="mb-3"><label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="Enter your email" required/></div>
    <div class="mb-3"><label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter your password" required/></div>
    <button type="submit" class="btn btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
  </form>
  <div class="register-link">
    <a href="/register"><i class="bi bi-person-plus me-1"></i>New reporter? Create an account</a>
  </div>
  <div class="creds">
    <p>Demo Credentials</p>
    <div class="cred-row"><span>reporter@mis.com / reporter123</span><span class="badge bg-success" style="font-size:.65rem">Reporter</span></div>
    <div class="cred-row"><span>analyst@mis.com / analyst123</span><span class="badge bg-warning text-dark" style="font-size:.65rem">Analyst</span></div>
    <div class="cred-row"><span>admin@mis.com / admin123</span><span class="badge bg-danger" style="font-size:.65rem">Admin</span></div>
    <div class="cred-row"><span>management@mis.com / management123</span><span class="badge bg-info text-dark" style="font-size:.65rem">Mgmt</span></div>
  </div>
</div>
</body></html>
